<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王超投资系统 · 总览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'PingFang SC', 'SF Pro Display', 'Helvetica Neue', sans-serif;
  background: #0a0f1a;
  color: #e0e6ed;
  min-height: 100vh;
  font-size: 16px;
}

/* ===== Sidebar ===== */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 80px;
  height: 100vh;
  background: #0a0f1a;
  border-right: 1px solid #1e3a5f;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 12px;
  overflow-y: auto;
}
.sidebar a.nav-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 80px;
  height: 72px;
  text-decoration: none;
  color: #6b7b8d;
  border-left: 3px solid transparent;
  transition: all 0.2s ease;
  padding: 8px 0;
}
.sidebar a.nav-btn:hover {
  color: #c9a84c;
  background: rgba(201,168,76,0.05);
}
.sidebar a.nav-btn.active {
  color: #c9a84c;
  border-left-color: #c9a84c;
  background: rgba(201,168,76,0.08);
}
.sidebar a.nav-btn svg {
  width: 24px;
  height: 24px;
  margin-bottom: 4px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.sidebar a.nav-btn .nav-label {
  font-size: 12px;
  line-height: 1.2;
  white-space: nowrap;
}

/* ===== Main Content ===== */
.main-content {
  padding-left: 80px;
  min-height: 100vh;
}
.page-inner {
  max-width: 960px;
  margin: 0 auto;
  padding: 40px 24px;
}
.page-title {
  font-size: 28px;
  font-weight: 700;
  color: #c9a84c;
  margin-bottom: 8px;
}
.page-subtitle {
  font-size: 14px;
  color: #6b7b8d;
  margin-bottom: 32px;
}

/* ===== Card Grid ===== */
.card-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}
@media (max-width: 720px) {
  .card-grid {
    grid-template-columns: 1fr;
  }
  .page-inner {
    padding: 24px 12px;
  }
}

.card {
  background: #111827;
  border: 1px solid #1e3a5f;
  border-radius: 12px;
  padding: 24px;
  cursor: pointer;
  transition: all 0.25s ease;
  text-decoration: none;
  color: inherit;
  display: block;
}
.card:hover {
  border-color: #c9a84c;
  box-shadow: 0 0 20px rgba(201,168,76,0.1);
  transform: translateY(-2px);
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  color: #c9a84c;
}
.card-arrow {
  color: #6b7b8d;
  font-size: 18px;
  transition: transform 0.2s;
}
.card:hover .card-arrow {
  transform: translateX(3px);
  color: #c9a84c;
}

/* ===== Card 1: Bubble ===== */
.score-big {
  font-size: 48px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 8px;
}
.score-big.green { color: #22c55e; }
.score-big.yellow { color: #eab308; }
.score-big.red { color: #ef4444; }
.score-status {
  font-size: 14px;
  color: #6b7b8d;
}

/* ===== Card 2: Foundation ===== */
.stock-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid rgba(30,58,95,0.4);
  font-size: 14px;
}
.stock-row:last-child { border-bottom: none; }
.stock-name { color: #e0e6ed; }
.stock-ratio { font-weight: 600; }
.stock-ratio.highlight { color: #22c55e; }
.stock-ratio.normal { color: #6b7b8d; }

/* ===== Card 3 & 4: Single Stock ===== */
.price-big {
  font-size: 36px;
  font-weight: 700;
  color: #e0e6ed;
  margin-bottom: 4px;
}
.price-currency {
  font-size: 14px;
  color: #6b7b8d;
  font-weight: 400;
}
.stock-meta {
  font-size: 13px;
  color: #6b7b8d;
  margin-top: 8px;
}
.risk-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  margin-top: 6px;
}
.risk-badge.warning {
  background: rgba(234,179,8,0.15);
  color: #eab308;
}
.risk-badge.safe {
  background: rgba(34,197,94,0.15);
  color: #22c55e;
}
</style>
</head>

<!-- ===== Sidebar Active State Script ===== -->
<script>
(function() {
  var activePage = document.body.getAttribute('data-active-page');

    var btn = document.querySelector('.sidebar a.nav-btn[data-page="' + activePage + '"]');
    if (btn) btn.classList.add('active');
  }
})();
</script>
