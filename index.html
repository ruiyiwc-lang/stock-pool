.header {

}
.header h1 { font-size: 28px; font-weight: 600; color: #f0f0f5; }
.header .status { font-size: 16px; margin-top: 8px; color: #666; }

.summary {

}
.summary span { display: flex; align-items: center; gap: 5px; }
.summary .d { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

.filters {
  display: flex; justify-content: center; gap: 5px;

}
.filters button {
  padding: 5px 14px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.07);

  cursor: pointer; transition: all 0.15s;
}
.filters button:hover { color: #ccc; border-color: rgba(255,255,255,0.2); }
.filters button.on { background: rgba(255,255,255,0.06); color: #fff; border-color: rgba(255,255,255,0.2); }

.pool { max-width: 1200px; margin: 0 auto; }

.row {
  display: grid;
  grid-template-columns: 28px 110px 140px 68px 52px minmax(60px, 1fr) 62px 180px;
  align-items: center;
  gap: 6px;
  padding: 10px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.035);
  transition: background 0.12s;
}
.row:hover { background: rgba(255,255,255,0.025); }
.row-head {
  font-size: 13px; color: #444; letter-spacing: 0.2px;
  padding: 7px 12px; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.row-head:hover { background: transparent; }

.col-sig { font-size: 18px; text-align: center; }
.col-name { font-size: 16px; font-weight: 500; line-height: 1.3; }
.col-name .code { font-size: 12px; color: #444; font-weight: 400; }
.col-name .board { font-size: 10px; font-weight: 400; padding: 1px 4px; border-radius: 3px; margin-left: 4px; vertical-align: middle; }
.col-name .board-sh { background: rgba(239,68,68,0.15); color: #f87171; }
.col-name .board-sz { background: rgba(59,130,246,0.15); color: #60a5fa; }
.col-name .board-cy { background: rgba(168,85,247,0.15); color: #a78bfa; }
.col-name .board-kc { background: rgba(234,179,8,0.15); color: #facc15; }
.col-name .board-hk { background: rgba(34,197,94,0.15); color: #4ade80; }
.col-price { font-size: 16px; font-weight: 600; font-variant-numeric: tabular-nums; text-align: right; }
.col-price .cur-metric { font-size: 11px; font-weight: 400; color: #888; margin-top: 1px; }
.col-chg { font-size: 12px; font-weight: 500; text-align: right; font-variant-numeric: tabular-nums; }
.col-chg.up { color: #ef4444; }
.col-chg.dn { color: #22c55e; }

/* Bar */
.col-bar { position: relative; height: 46px; }
.bar-track {
  position: absolute; top: 10px; left: 0; right: 0; height: 4px;
  background: rgba(255,255,255,0.06); border-radius: 2px;
}
.bar-mk {
  position: absolute; top: 4px; width: 2px; height: 16px; border-radius: 1px;
}
.mk-b { background: #22c55e; left: 0; }
.mk-a { background: #3b82f6; }
.mk-r { background: rgba(239,68,68,0.5); right: 0; left: auto; }
.bar-dot {
  position: absolute; top: 5px;
  width: 13px; height: 13px; border-radius: 50%;
  transform: translateX(-50%);
  transition: left 0.3s;
}
.bar-dot.strong { background: #22c55e; }
.bar-dot.buy { background: #3b82f6; }
.bar-dot.watch { background: #eab308; }
.bar-dot.expensive { background: #ef4444; }
.bar-lbl {
  position: absolute; top: 26px; font-size: 11px; color: #444;
  transform: translateX(-50%);
  white-space: nowrap;
}
.bar-lbl input {
  width: 48px; padding: 0 2px; border: none; border-bottom: 1px solid rgba(255,255,255,0.1);
  background: transparent; color: #666; font-size: 11px; text-align: center;
  font-variant-numeric: tabular-nums; outline: none;
}
.bar-lbl input:focus { border-bottom-color: rgba(59,130,246,0.5); color: #e8e8ec; }
.bar-lbl input.lbl-b { color: #4ade80; }
.bar-lbl input.lbl-a { color: #60a5fa; }
.bar-lbl input.lbl-r { color: #ef4444; }
.bar-lbl .u { font-size: 9px; color: #555; margin-left: 1px; }

.col-hold {

}
.col-hold .hold-inputs {
  display: flex; gap: 3px; align-items: center;
}
.col-hold input {

  border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03);

.col-hold input:focus { border-color: rgba(59,130,246,0.4); }
.col-hold input::placeholder { color: #333; }
.col-hold .hold-pnl { font-size: 11px; margin-top: 2px; }
.col-hold .pnl-up { color: #ef4444; }
.col-hold .pnl-dn { color: #22c55e; }
.col-hold .hold-mv { color: #666; }

.col-adv {

.adv-buy { background: rgba(59,130,246,0.2); color: #60a5fa; }

/* Rule column (last) */
.col-rule {

  padding-left: 6px;

.col-rule .r { display: block; }
.col-rule .tag-b { color: #4ade80; }
.col-rule .tag-a { color: #60a5fa; }
.col-rule .tag-ctx { color: #888; }

.legend {

.legend h3 { font-size: 16px; color: #888; margin-bottom: 5px; }

.section-label {

  display: flex; align-items: center; gap: 10px;

.section-label::after {

.section-label .badge {

.watch-row { opacity: 0.6; }
.watch-row:hover { opacity: 0.85; }

.err-msg { text-align: center; color: #ef4444; font-size: 11px; margin: 10px 0; }

.hold-summary {

@media (max-width: 480px) {

<script>
(function() {
  var stocks = STOCK_POOL_CONFIG.stocks;
  var poolStocks = stocks.filter(function(s){return s.zone==='pool';});
  var watchStocks = stocks.filter(function(s){return s.zone==='watch';});
  var betStocks = stocks.filter(function(s){return s.zone==='bet';});
  var prices = {};
  var curSector = null, curSignal = null;
  var fetchCount = 0;

  function boardTag(s) {
    if (s.market==='HK') return '<span class="board board-hk">港股</span>';
    var c = s.code;
    if (c.startsWith('68')) return '<span class="board board-kc">科创</span>';
    if (c.startsWith('30')) return '<span class="board board-cy">创业</span>';
    if (c.startsWith('6')) return '<span class="board board-sh">沪A</span>';
    if (c.startsWith('0')) return '<span class="board board-sz">深A</span>';
    return '';
  }

  function secId(s) {
    if (s.market==='SH') return 'sh'+s.code;
    if (s.market==='SZ') return 'sz'+s.code;
    return 'hk'+s.code;
  }

  function fetchPrices() {
    var ids = stocks.map(function(s){return secId(s);}).join(',');
    var url = 'https://qt.gtimg.cn/q=' + ids + '&_=' + Date.now();
    var sc = document.createElement('script');
    sc.src = url;
    sc.onload = function() {
      stocks.forEach(function(s) {
        var varName = 'v_' + secId(s);
        var val = window[varName];
        if (val && val.length > 0) {
          var parts = val.split('~');
          var price = parseFloat(parts[3]);
          var chg = parseFloat(parts[32]);
          if (price > 0) prices[s.code] = { price: price, change: chg };
        }
      });
      fetchCount++;
      render();
      try { sc.parentNode.removeChild(sc); } catch(e){}
    };
    sc.onerror = function() {
      document.getElementById('status').innerHTML = '<span style="color:#ef4444">API连接失败，30秒后重试...</span>';
      try { sc.parentNode.removeChild(sc); } catch(e){}
    };
    document.head.appendChild(sc);
  }

  function sig(s) {
    var p = prices[s.code]; if(!p) return 'watch';
    var t = getThresholds(s);
    if(p.price<=t.lineB) return 'strong';
    if(p.price<=t.lineA) return 'buy';
    if(p.price>=t.red) return 'expensive';
    return 'watch';
  }
  var emo = {strong:'\u{1F7E2}',buy:'\u{1F535}',watch:'\u{1F7E1}',expensive:'\u{1F534}'};

  function render() {
    // Skip render if user is typing in an input
    var active = document.activeElement;
    if (active && active.tagName === 'INPUT' && active.id && (active.id.startsWith('inp-') || active.id.startsWith('th-'))) return;

    var now = new Date(), loaded = Object.keys(prices).length;
    if(loaded > 0){
      var y = now.getFullYear(), mon = now.getMonth()+1, day = now.getDate();
      var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
      var pad = function(n){return n<10?'0'+n:n;};
      var ts = y+'-'+pad(mon)+'-'+pad(day)+' '+pad(h)+':'+pad(m)+':'+pad(s);
      var wd = now.getDay();
      var trading = wd>=1 && wd<=5 && (h*100+m)>=925 && (h*100+m)<=1500;
      document.getElementById('status').innerHTML = trading
        ? '<span class="live">\u25CF \u5B9E\u65F6</span> '+ts
        : '\u6700\u540E\u5237\u65B0: '+ts;
    } else if(fetchCount > 0) {
      document.getElementById('status').innerHTML = '<span style="color:#ef4444">未获取到数据</span>';
    }

    var cnt = {strong:0,buy:0,watch:0,expensive:0};
    poolStocks.concat(betStocks).forEach(function(s){cnt[sig(s)]++;});
    document.getElementById('summary').innerHTML =
      '<span><span class="d" style="background:#22c55e"></span>'+cnt.strong+'\u5F3A\u70C8</span>'+
      '<span><span class="d" style="background:#3b82f6"></span>'+cnt.buy+'\u63A8\u8350</span>'+
      '<span><span class="d" style="background:#eab308"></span>'+cnt.watch+'\u76D1\u63A7</span>'+
      '<span><span class="d" style="background:#ef4444"></span>'+cnt.expensive+'\u504F\u8D35</span>'+
      '<span style="color:#555">| \u89C2\u5BDF\u533A'+watchStocks.length+' | \u8D4C\u6CE8'+betStocks.length+'</span>';

    var pool = document.getElementById('pool');
    pool.innerHTML = '';

    var ord = {strong:0,buy:1,watch:2,expensive:3};

    function renderSection(list, sectionLabel, isWatch) {
      if (sectionLabel) {
        var lbl = document.createElement('div');
        lbl.className = 'section-label';
        lbl.innerHTML = sectionLabel;
        pool.appendChild(lbl);
      }
      var hd = document.createElement('div');
      hd.className = 'row row-head';
      hd.innerHTML = '<div></div><div>\u540D\u79F0</div><div>\u6301\u4ED3</div><div style="text-align:right">\u73B0\u4EF7</div><div style="text-align:right">\u6DA8\u8DCC</div><div style="text-align:center">\u4F4D\u7F6E</div><div style="text-align:center">\u5EFA\u8BAE</div><div style="padding-left:6px">\u9608\u503C\u89C4\u5219</div>';
      pool.appendChild(hd);

      var sorted = list.slice().sort(function(a,b){
        var pa = prices[a.code], pb = prices[b.code];
        // ratio = (price - B) / (A - B), lower = closer to B = more worth buying
        var ta = getThresholds(a), tb = getThresholds(b);
        var dA = ta.lineA - ta.lineB, dB = tb.lineA - tb.lineB;
        var ra = (pa && dA > 0) ? (pa.price - ta.lineB) / dA : 999;
        var rb = (pb && dB > 0) ? (pb.price - tb.lineB) / dB : 999;
        if (isNaN(ra)) ra = 999;
        if (isNaN(rb)) rb = 999;
        return ra - rb;
      });
      sorted.forEach(function(s){
        var signal = sig(s);
        if(curSector && s.sector!==curSector) return;
        if(curSignal && signal!==curSignal) return;
        var p = prices[s.code];
        var pStr = p ? p.price.toFixed(2) : '--';
        var cStr = p ? (p.change>=0?'+':'') + p.change.toFixed(2)+'%' : '';
        var cCls = p ? (p.change>=0?'up':'dn') : '';
        var curMStr = p ? '<div class="cur-metric">'+s.metric+' '+fmtMetric(priceToMetric(p.price,s),s)+metricUnit(s)+'</div>' : '';

        var t = getThresholds(s);
        var range = t.red - t.lineB;
        var pPos = p ? Math.max(0, Math.min(100, (p.price-t.lineB)/range*100)) : 50;
        var aPos = (t.lineA-t.lineB)/range*100;

        var row = document.createElement('div');
        row.className = 'row' + (isWatch ? ' watch-row' : '');

        var h = getHolding(s.code);
        var holdHtml = '';
        if (h && h.shares > 0 && p) {
          var pnlPct = ((p.price - h.cost)/h.cost*100).toFixed(1);
          var pnlCls = pnlPct >= 0 ? 'pnl-up' : 'pnl-dn';
          holdHtml = '<div class="hold-inputs">'+
            '<input type="number" id="inp-s-'+s.code+'" value="'+h.shares+'" placeholder="股数" onblur="saveHold(\''+s.code+'\')">'+
            '<input type="number" step="0.01" id="inp-c-'+s.code+'" value="'+h.cost+'" placeholder="成本" onblur="saveHold(\''+s.code+'\')">'+
            '</div>'+
            '<div class="hold-pnl"><span class="hold-mv">'+h.shares+'股</span> <span class="'+pnlCls+'">'+(pnlPct>=0?'+':'')+pnlPct+'%</span></div>';
        } else {
          holdHtml = '<div class="hold-inputs">'+
            '<input type="number" id="inp-s-'+s.code+'" value="" placeholder="股数" onblur="saveHold(\''+s.code+'\')">'+
            '<input type="number" step="0.01" id="inp-c-'+s.code+'" value="" placeholder="成本" onblur="saveHold(\''+s.code+'\')">'+
            '</div>';
        }

        var adv = getAdvice(s);

        var parts = s.note.split('\uFF5C');
        var aRule = '', bRule = '', ctxArr = [];
        parts.forEach(function(r){
          if(r.startsWith('A=')) aRule = r;
          else if(r.startsWith('B=')) bRule = r;
          else ctxArr.push(r);
        });
        var ctx = ctxArr.slice(0,2).join(' ');

        row.innerHTML =
          '<div class="col-sig">'+emo[signal]+'</div>'+
          '<div class="col-name">'+s.name+boardTag(s)+'<div class="code">'+s.market+':'+s.code+'</div></div>'+
          '<div class="col-hold">'+holdHtml+'</div>'+
          '<div class="col-price">'+pStr+curMStr+'</div>'+
          '<div class="col-chg '+cCls+'">'+cStr+'</div>'+
          '<div class="col-bar">'+
            '<div class="bar-track"></div>'+
            '<div class="bar-mk mk-b"></div>'+
            '<div class="bar-mk mk-a" style="left:'+aPos+'%"></div>'+
            '<div class="bar-mk mk-r"></div>'+
            '<div class="bar-dot '+signal+'" style="left:'+pPos+'%"></div>'+
            '<div class="bar-lbl" style="left:0"><input class="lbl-b" type="number" step="0.1" value="'+fmtMetric(t.valB,s)+'" id="th-b-'+s.code+'" onblur="saveThresh(\''+s.code+'\',\'valB\',this.value)"><span class="u">'+metricUnit(s)+'</span></div>'+
            '<div class="bar-lbl" style="left:'+aPos+'%"><input class="lbl-a" type="number" step="0.1" value="'+fmtMetric(t.valA,s)+'" id="th-a-'+s.code+'" onblur="saveThresh(\''+s.code+'\',\'valA\',this.value)"><span class="u">'+metricUnit(s)+'</span></div>'+
            '<div class="bar-lbl" style="left:100%"><input class="lbl-r" type="number" step="0.1" value="'+fmtMetric(t.valRed,s)+'" id="th-r-'+s.code+'" onblur="saveThresh(\''+s.code+'\',\'valRed\',this.value)"><span class="u">'+metricUnit(s)+'</span></div>'+
          '</div>'+
          '<div class="col-adv '+adv.cls+'">'+adv.tag+'</div>'+
          '<div class="col-rule">'+
            '<span class="r"><span class="tag-a">'+aRule+'</span> <span class="tag-b">'+bRule+'</span></span>'+
            '<span class="r tag-ctx">'+ctx+'</span>'+
          '</div>';
        pool.appendChild(row);
      });
    }

    // Filter
    var pf = curSector||curSignal ? poolStocks.filter(function(s){
      if(curSector && s.sector!==curSector) return false;
      if(curSignal && sig(s)!==curSignal) return false;
      return true;
    }) : poolStocks;
    if (pf.length > 0) {
      renderSection(poolStocks, '\u6B63\u5F0F\u6C60 <span class="badge">'+poolStocks.length+'\u53EA</span>', false);
    }

    var wf = curSector||curSignal ? watchStocks.filter(function(s){
      if(curSector && s.sector!==curSector) return false;
      if(curSignal && sig(s)!==curSignal) return false;
      return true;
    }) : watchStocks;
    if (wf.length > 0) {
      renderSection(watchStocks, '\u89C2\u5BDF\u533A <span class="badge">'+watchStocks.length+'\u53EA \u00B7 \u65B0\u5165\u6C60/\u7EA2\u706F\u964D\u7EA7</span>', true);
    }

    var bf = curSector||curSignal ? betStocks.filter(function(s){
      if(curSector && s.sector!==curSector) return false;
      if(curSignal && sig(s)!==curSignal) return false;
      return true;
    }) : betStocks;
    if (bf.length > 0) {
      renderSection(betStocks, '\uD83C\uDFAF \u54C1\u7C7B\u5B9A\u4E49\u8005\u8D4C\u6CE8 <span class="badge">'+betStocks.length+'\u53EA \u00B7 \u4E8F50%\u535A5x/10\u5E74</span>', false);
    }
    updateHoldSummary();
  }

  // === Metric ↔ Price conversion ===
  function metricToPrice(val, s) {
    if (s.metric === 'yield') return s.basis / (val / 100);
    return s.basis * val; // PE, PB, PEV
  }
  function priceToMetric(price, s) {
    if (s.metric === 'yield') return s.basis / price * 100;
    return price / s.basis; // PE, PB, PEV
  }
  function metricUnit(s) {
    return s.metric === 'yield' ? '%' : 'x';
  }
  function fmtMetric(val, s) {
    if (s.metric === 'yield') return val.toFixed(1);
    if (val < 2) return val.toFixed(2);
    return val >= 10 ? val.toFixed(1) : val.toFixed(1);
  }

  // === Threshold overrides (localStorage, stored as metric values) ===
  function getThresholds(s) {
    var vA = s.valA, vB = s.valB, vR = s.valRed;
    // Default: use hardcoded prices (exact); only recalculate when user overrides
    var pA = s.lineA, pB = s.lineB, pR = s.red;
    try {
      var d = JSON.parse(localStorage.getItem('sp_thresh_'+s.code));
      if (d) {
        if (d.valA) { vA = d.valA; pA = metricToPrice(vA, s); }
        if (d.valB) { vB = d.valB; pB = metricToPrice(vB, s); }
        if (d.valRed) { vR = d.valRed; pR = metricToPrice(vR, s); }
      }
    } catch(e){}
    return {
      valA: vA, valB: vB, valRed: vR,
      lineA: pA, lineB: pB, red: pR
    };
  }
  function setThreshold(code, key, val) {
    var cur = {};
    try { cur = JSON.parse(localStorage.getItem('sp_thresh_'+code)) || {}; } catch(e){}
    cur[key] = val;
    localStorage.setItem('sp_thresh_'+code, JSON.stringify(cur));
  }

  // === Holdings logic ===
  function getHolding(code) {
    try { var d = JSON.parse(localStorage.getItem('sp_hold_'+code)); return d||null; } catch(e){ return null; }
  }
  function setHolding(code, shares, cost) {
    localStorage.setItem('sp_hold_'+code, JSON.stringify({shares:shares, cost:cost}));
  }
  function clearHolding(code) { localStorage.removeItem('sp_hold_'+code); }

  function getAdvice(s) {
    var p = prices[s.code]; if(!p) return {tag:'--',cls:'adv-wait',text:'等待价格数据...'};
    var price = p.price;
    var t = getThresholds(s);
    var h = getHolding(s.code);
    var hasPos = h && h.shares > 0;
    var pnlPct = hasPos ? (price - h.cost)/h.cost*100 : 0;
    var mu = metricUnit(s);
    var curMetric = priceToMetric(price, s);

    if (!hasPos) {
      if (price <= t.lineB) return {tag:'强烈买入',cls:'adv-strong-buy',text:'极端恐慌价('+s.metric+' '+fmtMetric(curMetric,s)+mu+')，重仓信号。'};
      if (price <= t.lineA) return {tag:'建议买入',cls:'adv-buy',text:'已到历史低分位('+s.metric+' '+fmtMetric(curMetric,s)+mu+')，适合建仓。'};
      if (price < t.red) return {tag:'观望',cls:'adv-wait',text:'当前'+s.metric+' '+fmtMetric(curMetric,s)+mu+'，未到A线('+fmtMetric(t.valA,s)+mu+')。'};
      return {tag:'不建议',cls:'adv-wait',text:'当前'+s.metric+' '+fmtMetric(curMetric,s)+mu+'偏贵(超红线'+fmtMetric(t.valRed,s)+mu+')。'};
    }

    // Has position
    if (price <= t.lineB) return {tag:'加仓',cls:'adv-add',text:'极端恐慌区('+s.metric+' '+fmtMetric(curMetric,s)+mu+')，强烈建议加仓。持仓'+(pnlPct>=0?'+':'')+pnlPct.toFixed(1)+'%。'};
    if (price <= t.lineA) {
      if (pnlPct < -10) return {tag:'加仓',cls:'adv-add',text:'仍在A线内('+s.metric+' '+fmtMetric(curMetric,s)+mu+')，建议加仓。浮亏'+Math.abs(pnlPct).toFixed(1)+'%。'};
      return {tag:'可加仓',cls:'adv-buy',text:'A线区间('+s.metric+' '+fmtMetric(curMetric,s)+mu+')，可加仓。'+(pnlPct>=0?'+':'')+pnlPct.toFixed(1)+'%。'};
    }
    if (price < t.red) {
      if (pnlPct > 40) return {tag:'止盈减仓',cls:'adv-reduce',text:'盈利'+pnlPct.toFixed(1)+'%且接近红线，建议减仓1/3。'};
      if (pnlPct > 25) return {tag:'持有观察',cls:'adv-hold',text:'盈利'+pnlPct.toFixed(1)+'%，持有。若'+s.metric+'超'+fmtMetric(t.valRed,s)+mu+'考虑止盈。'};
      return {tag:'持有',cls:'adv-hold',text:s.metric+' '+fmtMetric(curMetric,s)+mu+'，'+(pnlPct>=0?'+':'')+pnlPct.toFixed(1)+'%，继续持有。'};
    }
    // price >= red
    if (pnlPct > 30) return {tag:'建议卖出',cls:'adv-sell',text:s.metric+'已达'+fmtMetric(curMetric,s)+mu+'(超红线)+盈利'+pnlPct.toFixed(1)+'%，建议止盈。'};
    if (pnlPct > 0) return {tag:'减仓',cls:'adv-reduce',text:'超红线('+s.metric+' '+fmtMetric(curMetric,s)+mu+')，盈利'+pnlPct.toFixed(1)+'%，建议减仓。'};
    return {tag:'持有',cls:'adv-hold',text:'超红线但浮亏'+Math.abs(pnlPct).toFixed(1)+'%，等解套后减仓。'};
  }

  function buildPanel(s) {
    // removed - inline now
  }

  function updateHoldSummary() {
    var totalMv = 0, totalCost = 0, count = 0;
    stocks.forEach(function(s){
      var h = getHolding(s.code), p = prices[s.code];
      if (h && h.shares > 0 && p) {
        totalMv += p.price * h.shares;
        totalCost += h.cost * h.shares;
        count++;
      }
    });
    var el = document.getElementById('holdSummary');
    if (count > 0) {
      var pnl = totalMv - totalCost;
      var pnlPct = (pnl/totalCost*100).toFixed(2);
      var cls = pnl >= 0 ? 'pnl-up' : 'pnl-dn';
      el.className = 'hold-summary visible';
      el.innerHTML = '<span>持仓: <b>'+count+'</b>只</span>' +
        '<span>总市值: <b>'+Math.round(totalMv).toLocaleString()+'</b></span>' +
        '<span>总成本: <b>'+Math.round(totalCost).toLocaleString()+'</b></span>' +
        '<span class="'+cls+'">总盈亏: <b>'+(pnl>=0?'+':'')+Math.round(pnl).toLocaleString()+' ('+(pnlPct>=0?'+':'')+pnlPct+'%)</b></span>';
    } else {
      el.className = 'hold-summary';
      el.innerHTML = '';
    }
  }

  // Global functions for threshold editing
  window.saveThresh = function(code, key, val) {
    var v = parseFloat(val);
    if (!v || v <= 0) return;
    setThreshold(code, key, v);
    clearTimeout(window._renderTimer);
    window._renderTimer = setTimeout(render, 300);
  };

  // Global functions for inline input
  window.saveHold = function(code) {
    var sharesEl = document.getElementById('inp-s-'+code);
    var costEl = document.getElementById('inp-c-'+code);
    if (!sharesEl || !costEl) return;
    var shares = parseFloat(sharesEl.value) || 0;
    var cost = parseFloat(costEl.value) || 0;
    if (shares > 0 && cost > 0) {
      setHolding(code, shares, cost);
    } else {
      clearHolding(code);
    }
    clearTimeout(window._renderTimer);
    window._renderTimer = setTimeout(render, 300);
  };
  window.clearHold = function(code) {
    clearHolding(code);
    render();
  };

  function initFilters() {
    var el = document.getElementById('filters');
    var sectors = ['全部'];
    var seen = {};
    stocks.forEach(function(s){ if(!seen[s.sector]){seen[s.sector]=1; sectors.push(s.sector);} });
    sectors.forEach(function(sec, i){
      var b = document.createElement('button');
      b.textContent = sec;
      if(i===0) b.className = 'on';
      b.onclick = function(){
        el.querySelectorAll('button').forEach(function(x){x.classList.remove('on');});
        b.classList.add('on');
        curSector = sec==='\u5168\u90E8' ? null : sec;
        curSignal = null;
        render();
      };
      el.appendChild(b);
    });
    [['\u5F3A\u70C8','strong'],['\u63A8\u8350','buy'],['\u76D1\u63A7','watch'],['\u504F\u8D35','expensive']].forEach(function(pair){
      var b = document.createElement('button');
      b.textContent = pair[0];
      b.onclick = function(){
        el.querySelectorAll('button').forEach(function(x){x.classList.remove('on');});
        b.classList.add('on');
        curSector = null;
        curSignal = pair[1];
        render();
      };
      el.appendChild(b);
    });
  }

  initFilters();
  render();
  fetchPrices();
  setInterval(fetchPrices, 30000);
})();
</script>
</body>
</html>
