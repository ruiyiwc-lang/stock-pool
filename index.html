<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI估值泡沫破灭逆向股票池</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'PingFang SC', 'SF Pro Display', sans-serif;
  background: #0a0a0f;
  color: #e8e8ec;
  min-height: 100vh;
  padding: 16px;
}
.header {
  text-align: center;
  padding: 16px 0 10px;
  margin-bottom: 12px;
}
.header h1 { font-size: 18px; font-weight: 600; color: #f0f0f5; }
.header .status { font-size: 12px; margin-top: 6px; color: #666; }
.status .live { color: #4ade80; }

.summary {
  display: flex; justify-content: center; gap: 14px;
  margin-bottom: 14px; flex-wrap: wrap; font-size: 12px;
}
.summary span { display: flex; align-items: center; gap: 4px; }
.summary .d { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

.filters {
  display: flex; justify-content: center; gap: 5px;
  margin-bottom: 12px; flex-wrap: wrap;
}
.filters button {
  padding: 3px 10px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.07);
  background: transparent; color: #777; font-size: 11px;
  cursor: pointer; transition: all 0.15s;
}
.filters button:hover { color: #ccc; border-color: rgba(255,255,255,0.2); }
.filters button.on { background: rgba(255,255,255,0.06); color: #fff; border-color: rgba(255,255,255,0.2); }

.pool { max-width: 1200px; margin: 0 auto; }

.row {
  display: grid;
  grid-template-columns: 24px 82px 58px 48px minmax(120px, 1fr) 200px;
  align-items: center;
  gap: 6px;
  padding: 9px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.035);
  transition: background 0.12s;
}
.row:hover { background: rgba(255,255,255,0.025); }
.row-head {
  font-size: 9px; color: #444; letter-spacing: 0.2px;
  padding: 5px 10px; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.row-head:hover { background: transparent; }

.col-sig { font-size: 13px; text-align: center; }
.col-name { font-size: 12px; font-weight: 500; line-height: 1.3; }
.col-name .code { font-size: 9px; color: #444; font-weight: 400; }
.col-price { font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; text-align: right; }
.col-chg { font-size: 10px; font-weight: 500; text-align: right; font-variant-numeric: tabular-nums; }
.col-chg.up { color: #ef4444; }
.col-chg.dn { color: #22c55e; }

/* Bar */
.col-bar { position: relative; height: 22px; }
.bar-track {
  position: absolute; top: 9px; left: 0; right: 0; height: 3px;
  background: rgba(255,255,255,0.06); border-radius: 2px;
}
.bar-mk {
  position: absolute; top: 4px; width: 1.5px; height: 13px; border-radius: 1px;
}
.mk-b { background: #22c55e; left: 0; }
.mk-a { background: #3b82f6; }
.mk-r { background: rgba(239,68,68,0.5); right: 0; left: auto; }
.bar-dot {
  position: absolute; top: 6px;
  width: 9px; height: 9px; border-radius: 50%;
  transform: translateX(-50%);
  transition: left 0.3s;
}
.bar-dot.strong { background: #22c55e; }
.bar-dot.buy { background: #3b82f6; }
.bar-dot.watch { background: #eab308; }
.bar-dot.expensive { background: #ef4444; }
.bar-lbl {
  position: absolute; bottom: -1px; font-size: 8px; color: #444;
  transform: translateX(-50%);
}

/* Rule column */
.col-rule {
  font-size: 10px; color: #666; line-height: 1.5;
  padding-left: 8px;
  white-space: nowrap;
}
.col-rule .r { display: block; }
.col-rule .tag-b { color: #4ade80; }
.col-rule .tag-a { color: #60a5fa; }
.col-rule .tag-ctx { color: #888; }

.legend {
  max-width: 1200px; margin: 20px auto 0; padding: 12px 14px;
  background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.04);
  border-radius: 8px; font-size: 10px; color: #555; line-height: 1.7;
}
.legend h3 { font-size: 11px; color: #888; margin-bottom: 3px; }

.section-label {
  max-width: 1200px; margin: 18px auto 6px;
  padding: 0 10px;
  font-size: 12px; font-weight: 600; color: #888;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after {
  content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06);
}
.section-label .badge {
  font-size: 10px; font-weight: 400; color: #666;
  background: rgba(255,255,255,0.04); padding: 1px 6px; border-radius: 6px;
}
.watch-row { opacity: 0.6; }
.watch-row:hover { opacity: 0.85; }

@media (max-width: 768px) {
  .row { grid-template-columns: 20px 66px 50px 42px minmax(80px,1fr) 160px; gap: 4px; padding: 7px 6px; }
  .col-rule { font-size: 9px; }
  body { padding: 10px; }
}
@media (max-width: 480px) {
  .row { grid-template-columns: 18px 58px 44px 38px 1fr; }
  .col-rule { display: none; }
}
</style>
</head>
<body>

<div class="header">
  <h1>AI估值泡沫破灭逆向股票池</h1>
  <div class="status" id="status">正在获取数据...</div>
</div>
<div class="summary" id="summary"></div>
<div class="filters" id="filters"></div>
<div class="pool" id="pool"></div>

<div class="legend">
  <h3>规则</h3>
  <p><span style="color:#22c55e">●B线</span>=极端恐慌(重仓) &nbsp; <span style="color:#3b82f6">●A线</span>=低分位(建仓) &nbsp; <span style="color:#eab308">●监控</span>=未到A线 &nbsp; <span style="color:#ef4444">●偏贵</span>=超红线</p>
  <p>进度条: 左端B线 → 蓝标A线 → 右端红线。圆点=当前价。右列=该股阈值定价逻辑。</p>
  <p style="margin-top:4px"><b>观察区</b>：新扫描入池标的先进观察区30天验证→合格转正式池；正式池红灯超30天→降级观察区→再30天仍红灯→踢出。</p>
  <p><b>数据</b>：价格每30秒从东方财富实时拉取。股票列表每晚20:00全量扫描更新（新增/淘汰/升降级）。</p>
</div>

<script src="stock-pool-data.js"></script>
<script>
(function() {
  const stocks = STOCK_POOL_CONFIG.stocks;
  let prices = {};
  let curSector = null, curSignal = null;

  function secId(s) {
    if (s.market==='SH') return '1.'+s.code;
    if (s.market==='SZ') return '0.'+s.code;
    return '116.'+s.code;
  }

  async function fetchPrices() {
    const ids = stocks.map(s=>secId(s)).join(',');
    const url = `https://push2.eastmoney.com/api/qt/ulist.np/get?secids=${ids}&fields=f12,f14,f2,f3&cb=_p&_=${Date.now()}`;
    return new Promise(r => {
      window._p = function(d) {
        if(d&&d.data&&d.data.diff) d.data.diff.forEach(i => {
          const c=i.f12, s=stocks.find(x=>x.code===c);
          if(s&&i.f2>0) prices[c]={price:i.f2/(s.market==='HK'?1000:100), change:i.f3/100};
        });
        r(); delete window._p; try{document.body.removeChild(sc);}catch(e){}
      };
      const sc=document.createElement('script'); sc.src=url;
      sc.onerror=()=>{r();try{document.body.removeChild(sc);}catch(e){}};
      document.body.appendChild(sc);
    });
  }

  function sig(s) {
    const p=prices[s.code]; if(!p) return 'watch';
    if(p.price<=s.lineB) return 'strong';
    if(p.price<=s.lineA) return 'buy';
    if(p.price>=s.red) return 'expensive';
    return 'watch';
  }
  const emo={strong:'🟢',buy:'🔵',watch:'🟡',expensive:'🔴'};

  function render() {
    const now=new Date(), loaded=Object.keys(prices).length;
    if(loaded>0){
      const t=now.toTimeString().slice(0,8);
      const tr=now.getDay()>=1&&now.getDay()<=5&&now.getHours()*100+now.getMinutes()>=925&&now.getHours()*100+now.getMinutes()<=1500;
      document.getElementById('status').innerHTML=tr?`<span class="live">● 实时 ${t}</span>`:`${t} · 收盘`;
    }
    let cnt={strong:0,buy:0,watch:0,expensive:0};
    poolStocks.forEach(s=>cnt[sig(s)]++);
    document.getElementById('summary').innerHTML=`
      <span><span class="d" style="background:#22c55e"></span>${cnt.strong}强烈</span>
      <span><span class="d" style="background:#3b82f6"></span>${cnt.buy}推荐</span>
      <span><span class="d" style="background:#eab308"></span>${cnt.watch}监控</span>
      <span><span class="d" style="background:#ef4444"></span>${cnt.expensive}偏贵</span>
      <span style="color:#555">| 观察区${watchStocks.length}</span>`;

    const pool=document.getElementById('pool');
    pool.innerHTML='';

    const ord={strong:0,buy:1,watch:2,expensive:3};
    const poolStocks = stocks.filter(s=>s.zone!=='watch');
    const watchStocks = stocks.filter(s=>s.zone==='watch');

    function renderSection(list, sectionLabel, isWatch) {
      if (sectionLabel) {
        const lbl = document.createElement('div');
        lbl.className = 'section-label';
        lbl.innerHTML = sectionLabel;
        pool.appendChild(lbl);
      }
      const hd=document.createElement('div');
      hd.className='row row-head';
      hd.innerHTML=`<div></div><div>名称</div><div style="text-align:right">现价</div><div style="text-align:right">涨跌</div><div style="text-align:center">位置</div><div style="padding-left:8px">阈值规则</div>`;
      pool.appendChild(hd);

      const sorted = [...list].sort((a,b)=>ord[sig(a)]-ord[sig(b)]);
      sorted.forEach(s=>{
        const signal=sig(s);
        if(curSector&&s.sector!==curSector) return;
        if(curSignal&&signal!==curSignal) return;
        const p=prices[s.code];
        const pStr=p?p.price.toFixed(2):'--';
        const cStr=p?(p.change>=0?'+':'')+p.change.toFixed(2)+'%':'';
        const cCls=p?(p.change>=0?'up':'dn'):'';

        const range=s.red-s.lineB;
        const pPos=p?Math.max(0,Math.min(100,(p.price-s.lineB)/range*100)):50;
        const aPos=(s.lineA-s.lineB)/range*100;

        const parts = s.note.split('｜');
        const aRule = parts.find(r=>r.startsWith('A=')) || '';
        const bRule = parts.find(r=>r.startsWith('B=')) || '';
        const ctx = parts.filter(r=>!r.startsWith('A=')&&!r.startsWith('B=')).slice(0,2).join(' ');

        const row=document.createElement('div');
        row.className='row' + (isWatch ? ' watch-row' : '');
        row.innerHTML=`
          <div class="col-sig">${emo[signal]}</div>
          <div class="col-name">${s.name}<div class="code">${s.market}:${s.code}</div></div>
          <div class="col-price">${pStr}</div>
          <div class="col-chg ${cCls}">${cStr}</div>
          <div class="col-bar">
            <div class="bar-track"></div>
            <div class="bar-mk mk-b"></div>
            <div class="bar-mk mk-a" style="left:${aPos}%"></div>
            <div class="bar-mk mk-r"></div>
            <div class="bar-dot ${signal}" style="left:${pPos}%"></div>
            <div class="bar-lbl" style="left:0">${s.lineB}</div>
            <div class="bar-lbl" style="left:${aPos}%">${s.lineA}</div>
            <div class="bar-lbl" style="left:100%">${s.red}</div>
          </div>
          <div class="col-rule">
            <span class="r"><span class="tag-a">${aRule}</span> <span class="tag-b">${bRule}</span></span>
            <span class="r tag-ctx">${ctx}</span>
          </div>
        `;
        pool.appendChild(row);
      });
    }

    // Render pool section
    const poolFiltered = curSector||curSignal ? poolStocks.filter(s=>{
      if(curSector&&s.sector!==curSector) return false;
      if(curSignal&&sig(s)!==curSignal) return false;
      return true;
    }) : poolStocks;
    if (poolFiltered.length > 0) {
      renderSection(poolStocks, `正式池 <span class="badge">${poolStocks.length}只</span>`, false);
    }

    // Render watch section
    const watchFiltered = curSector||curSignal ? watchStocks.filter(s=>{
      if(curSector&&s.sector!==curSector) return false;
      if(curSignal&&sig(s)!==curSignal) return false;
      return true;
    }) : watchStocks;
    if (watchFiltered.length > 0) {
      renderSection(watchStocks, `观察区 <span class="badge">${watchStocks.length}只 · 新入池/红灯降级</span>`, true);
    }
  }

  function initFilters() {
    const el=document.getElementById('filters');
    ['全部',...new Set(stocks.map(s=>s.sector))].forEach((sec,i)=>{
      const b=document.createElement('button');
      b.textContent=sec; b.className=i===0?'on':'';
      b.onclick=()=>{el.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');curSector=sec==='全部'?null:sec;curSignal=null;render();};
      el.appendChild(b);
    });
    [['强烈','strong'],['推荐','buy'],['监控','watch'],['偏贵','expensive']].forEach(([l,v])=>{
      const b=document.createElement('button');b.textContent=l;
      b.onclick=()=>{el.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');curSector=null;curSignal=v;render();};
      el.appendChild(b);
    });
  }

  async function tick(){await fetchPrices();render();}
  initFilters(); render(); tick(); setInterval(tick,30000);
})();
</script>
</body>
</html>
