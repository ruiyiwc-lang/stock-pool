* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'PingFang SC', 'SF Pro Display', 'Helvetica Neue', sans-serif;

}

/* ===== Sidebar ===== */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 80px;
  height: 100vh;
  background: #0a0f1a;
  border-right: 1px solid #1e3a5f;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 12px;
  overflow-y: auto;
}
.sidebar a.nav-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 80px;
  height: 72px;
  text-decoration: none;
  color: #6b7b8d;
  border-left: 3px solid transparent;
  transition: all 0.2s ease;
  padding: 8px 0;
}
.sidebar a.nav-btn:hover {
  color: #c9a84c;
  background: rgba(201,168,76,0.05);
}
.sidebar a.nav-btn.active {
  color: #c9a84c;

  background: rgba(201,168,76,0.08);
}
.sidebar a.nav-btn svg {
  width: 24px;
  height: 24px;
  margin-bottom: 4px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.sidebar a.nav-btn .nav-label {
  font-size: 14px;
  line-height: 1.2;

}

/* ===== Main Content ===== */
.main-content {
  padding-left: 80px;
  min-height: 100vh;
}
.page-inner {
  max-width: 960px;
  margin: 0 auto;
  padding: 40px 24px;
}
.page-title {
  font-size: 28px;
  font-weight: 700;
  color: #c9a84c;
  margin-bottom: 8px;
}
.page-subtitle {
  font-size: 14px;
  color: #6b7b8d;
  margin-bottom: 32px;
}

/* ===== Card Grid ===== */
.card-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}
@media (max-width: 720px) {
  .card-grid {
    grid-template-columns: 1fr;
  }
  .page-inner {
    padding: 24px 12px;
  }
}

.card {
  background: #111827;
  border: 1px solid #1e3a5f;
  border-radius: 12px;
  padding: 24px;
  cursor: pointer;
  transition: all 0.25s ease;
  text-decoration: none;
  color: inherit;
  display: block;
}
.card:hover {
  border-color: #c9a84c;
  box-shadow: 0 0 20px rgba(201,168,76,0.1);
  transform: translateY(-2px);
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  color: #c9a84c;
}
.card-arrow {
  color: #6b7b8d;
  font-size: 18px;
  transition: transform 0.2s;
}
.card:hover .card-arrow {
  transform: translateX(3px);
  color: #c9a84c;
}

/* ===== Card 1: Bubble ===== */
.score-big {
  font-size: 48px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 8px;
}
.score-big.green { color: #22c55e; }
.score-big.yellow { color: #eab308; }
.score-big.red { color: #ef4444; }
.score-status {
  font-size: 14px;
  color: #6b7b8d;
}

/* ===== Card 2: Foundation ===== */
.stock-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid rgba(30,58,95,0.4);
  font-size: 14px;
}
.stock-row:last-child { border-bottom: none; }
.stock-name { color: #e0e6ed; }
.stock-ratio { font-weight: 600; }
.stock-ratio.highlight { color: #22c55e; }
.stock-ratio.normal { color: #6b7b8d; }

/* ===== Card 3 & 4: Single Stock ===== */
.price-big {
  font-size: 36px;
  font-weight: 700;
  color: #e0e6ed;
  margin-bottom: 4px;
}
.price-currency {
  font-size: 14px;
  color: #6b7b8d;
  font-weight: 400;
}
.stock-meta {
  font-size: 13px;
  color: #6b7b8d;
  margin-top: 8px;
}
.risk-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 14px;
  font-weight: 600;
  margin-top: 6px;
}
.risk-badge.warning {
  background: rgba(234,179,8,0.15);
  color: #eab308;
}
.risk-badge.safe {
  background: rgba(34,197,94,0.15);
  color: #22c55e;
}

/* 数据校验面板 */

<script>
(function() {
  // Sidebar active state
  var activePage = document.body.getAttribute('data-active-page');
  if (activePage) {
    var btn = document.querySelector('.sidebar a.nav-btn[data-page="' + activePage + '"]');
    if (btn) btn.classList.add('active');
  }

  // ===== Bubble Temperature (使用 bubble-data.js 共享数据 + 计算引擎) =====
  var temp = bubbleCalcTemp();
  var el = document.getElementById('bubbleScore');
  var stEl = document.getElementById('bubbleStatus');
  var cls = temp < 25 ? 'green' : temp < 40 ? 'green' : temp < 55 ? 'yellow' : temp < 70 ? 'yellow' : 'red';
  el.className = 'score-big ' + cls;
  el.innerHTML = temp + '<span style="font-size:24px;color:#6b7b8d">/100</span>';
  var statusText = temp < 25 ? '低温·安全' : temp < 40 ? '温和·警觉' : temp < 55 ? '升温·差半步' : temp < 70 ? '高温·随时触发' : '过热·执行卖出';
  stEl.textContent = '当前状态：' + statusText;

  // PE ratio stocks (mature 15-30% growers)
  var FOUNDATION = [
    { id: 'BABA', name: 'BABA', qtCode: 'hk09988', avgPE: 25.0 },
    { id: 'GOOG', name: 'GOOG', qtCode: 'usGOOGL', avgPE: 23.6 },
    { id: 'TSMC', name: 'TSMC', qtCode: 'usTSM', avgPE: 25.8 }
  ];
  // SMIC uses price threshold (PE distorted by depreciation peak)
  var SMIC_H = { qtCode: 'hk00981', aHigh: 72 };
  var EXTRA = [
    { id: 'popmart', qtCode: 'hk09992' },
    { id: 'wuxi', qtCode: 'sh603259' }
  ];

  function fetchData() {
    var allCodes = FOUNDATION.map(function(s){return s.qtCode})
      .concat([SMIC_H.qtCode])
      .concat(EXTRA.map(function(s){return s.qtCode}));
    var url = 'https://qt.gtimg.cn/q=' + allCodes.join(',');
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4 && xhr.status === 200) {
        var data = {};
        var lines = xhr.responseText.split(';');
        for (var i = 0; i < lines.length; i++) {
          var match = lines[i].match(/v_([^=]+)="([^"]*)"/);
          if (!match) continue;
          var fields = match[2].split('~');
          data[match[1]] = {
            price: parseFloat(fields[3]) || 0,
            pe: parseFloat(fields[39]) || 0
          };
        }
        renderFoundation(data);
        renderSMIC(data);
        renderExtra(data);
      }
    };
    xhr.send();
  }

  function renderFoundation(data) {
    var results = [];
    for (var i = 0; i < FOUNDATION.length; i++) {
      var s = FOUNDATION[i];
      var d = data[s.qtCode] || { price: 0, pe: 0 };
      var ratio = d.pe > 0 ? d.pe / s.avgPE : 0;
      results.push({ name: s.name, ratio: ratio });
    }
    results.sort(function(a, b) { return a.ratio - b.ratio; });

    var html = '';
    for (var j = 0; j < results.length; j++) {
      var r = results[j];
      var cls = r.ratio < 1 ? 'highlight' : 'normal';
      var ratioStr = r.ratio > 0 ? r.ratio.toFixed(3) : '--';
      html += '<div class="stock-row"><span class="stock-name">' + r.name + '</span>';
      html += '<span class="stock-ratio ' + cls + '">PE÷均值 ' + ratioStr + '</span></div>';
    }
    document.getElementById('foundationRows').innerHTML = html;
  }

  function renderSMIC(data) {
    var d = data[SMIC_H.qtCode] || { price: 0, pe: 0 };
    var el = document.getElementById('smicStatus');
    if (d.price > 0) {
      var dist = ((d.price / SMIC_H.aHigh) - 1) * 100;
      if (d.price <= SMIC_H.aHigh) {
        el.textContent = 'HK$' + d.price.toFixed(1) + ' · A档内';
        el.className = 'stock-ratio highlight';
      } else {
        el.textContent = 'HK$' + d.price.toFixed(1) + ' · 距A档+' + dist.toFixed(0) + '%';
        el.className = 'stock-ratio normal';
      }
    }
  }

  function renderExtra(data) {
    var pm = data['hk09992'] || { price: 0, pe: 0 };
    document.getElementById('popmartPrice').textContent = pm.price > 0 ? pm.price.toFixed(2) : '--';
    document.getElementById('popmartMeta').textContent = 'PE(TTM) ' + (pm.pe > 0 ? pm.pe.toFixed(1) + 'x' : '--') + ' · 品类定义者A档';

    var wx = data['sh603259'] || { price: 0, pe: 0 };
    document.getElementById('wuxiPrice').textContent = wx.price > 0 ? wx.price.toFixed(2) : '--';
    document.getElementById('wuxiMeta').textContent = 'PE(TTM) ' + (wx.pe > 0 ? wx.pe.toFixed(1) + 'x' : '--') + ' · A档基础设施支柱';
  }

  fetchData();
  setInterval(fetchData, 60000);
})();
</script>

<script>

// ===== 数据双源校验 =====
var VERIFY_RESULTS = {};

function codeToSecid(code) {
  if (code.indexOf('hk') === 0) return '116.' + code.replace('hk','');
  if (code.indexOf('sh') === 0) return '1.' + code.replace('sh','');
  if (code.indexOf('sz') === 0) return '0.' + code.replace('sz','');
  return null;
}

function fetchVerifyPrices() {
  var items = [
    {code:'hk09988', name:'BABA-HK'},
    {code:'usGOOGL', name:'GOOG'},
    {code:'usTSM', name:'TSM'},
    {code:'hk00981', name:'中芯H'},
    {code:'hk09992', name:'泡泡玛特'},
    {code:'sh603259', name:'药明康德'}
  ];
  items.forEach(function(item) {
    var secid = codeToSecid(item.code);
    if (!secid) return;
    var qtRaw = window['v_' + item.code];
    var qtPrice = null;
    if (qtRaw) {
      var parts = (typeof qtRaw === 'string') ? qtRaw.split('~') : [];
      qtPrice = parseFloat(parts[3]) || null;
    }
    var controller = new AbortController();
    var timeoutId = setTimeout(function(){ controller.abort(); }, 5000);
    var url = 'https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=' + secid + '&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57&klt=101&fqt=1&end=20500101&lmt=1';
    fetch(url, {signal: controller.signal}).then(function(r){
      clearTimeout(timeoutId);
      return r.json();
    }).then(function(j){
      if (!j || !j.data || !j.data.klines || j.data.klines.length === 0) throw new Error('no data');
      var kline = j.data.klines[0].split(',');
      var emClose = parseFloat(kline[2]);
      recordVerify(item, qtPrice, emClose, 'eastmoney日K', kline[0]);
    }).catch(function(){
      clearTimeout(timeoutId);
      fetchIfzqFallback(item, qtPrice);
    });
  });
}

function fetchIfzqFallback(item, qtPrice) {
  var code = item.code;
  var ifzqCode, market;
  if (code.indexOf('hk') === 0) { ifzqCode = code; market = code; }
  else if (code.indexOf('sh') === 0 || code.indexOf('sz') === 0) { ifzqCode = code; market = code; }
  else { recordVerify(item, qtPrice, null, 'ifzq', null); return; }
  var url = 'https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=' + ifzqCode + ',day,,,1,qfq';
  if (code.indexOf('hk') === 0) {
    url = 'https://web.ifzq.gtimg.cn/appstock/app/hkfqkline/get?param=' + ifzqCode + ',day,,,1,qfq';
  }
  fetch(url).then(function(r){return r.json();}).then(function(j){
    if (!j || j.code !== 0 || !j.data) throw new Error('no data');
    var stockData = j.data[market] || j.data[Object.keys(j.data)[0]];
    if (!stockData) throw new Error('no stock data');
    var dayArr = stockData.qfqday || stockData.day;
    if (!dayArr || dayArr.length === 0) throw new Error('no kline');
    var lastDay = dayArr[dayArr.length - 1];
    var ifzqClose = parseFloat(lastDay[2]);
    recordVerify(item, qtPrice, ifzqClose, 'ifzq日K', lastDay[0]);
  }).catch(function(){
    recordVerify(item, qtPrice, null, 'ifzq', null);
  });
}

function recordVerify(item, qtPrice, src2Price, src2Source, src2Date) {
  if (qtPrice && src2Price) {
    var diff = Math.abs(qtPrice - src2Price) / qtPrice * 100;
    var status = diff < 1 ? 'pass' : (diff < 3 ? 'drift' : 'fail');
    VERIFY_RESULTS[item.code] = {name:item.name, src1:qtPrice, src2:src2Price, diff:diff, status:status, src2Source:src2Source, klineDate:src2Date};
  } else if (qtPrice) {
    VERIFY_RESULTS[item.code] = {name:item.name, src1:qtPrice, src2:null, diff:null, status:'fail', src2Source:src2Source||'备选源'};
  } else {
    VERIFY_RESULTS[item.code] = {name:item.name, src1:null, src2:src2Price||null, diff:null, status:'fail', src2Source:src2Source||'备选源'};
  }
  renderVerifyPanel();
}

function renderVerifyPanel() {
  var grid = document.getElementById('verifyGrid');
  var icon = document.getElementById('verifyIcon');
  var summary = document.getElementById('verifySummary');
  if (!grid) return;
  var html = '';
  var passCount = 0, driftCount = 0, failCount = 0, totalCount = 0;
  var codes = Object.keys(VERIFY_RESULTS).sort();
  codes.forEach(function(code) {
    var r = VERIFY_RESULTS[code];
    totalCount++;
    if (r.status === 'pass') passCount++;
    else if (r.status === 'drift') driftCount++;
    else failCount++;
    html += '<div class="verify-item ' + r.status + '">';
    html += '<div class="vi-head"><span class="vi-name">' + r.name + '</span><span class="vi-badge ' + r.status + '">' + (r.status==='pass'?'一致':r.status==='drift'?'偏差':'异常') + '</span></div>';
    html += '<div class="vi-row"><span class="src">qt.gtimg</span><span class="val">' + (r.src1 !== null ? r.src1.toFixed(2) : '失败') + '</span></div>';
    html += '<div class="vi-row"><span class="src">' + (r.src2Source||'eastmoney') + (r.klineDate?' ('+r.klineDate+')':'') + '</span><span class="val">' + (r.src2 !== null ? r.src2.toFixed(2) : '失败') + '</span></div>';
    if (r.diff !== null) html += '<div class="vi-row"><span class="src">偏差</span><span class="val">' + r.diff.toFixed(2) + '%</span></div>';
    html += '</div>';
  });
  grid.innerHTML = html;
  var overallStatus = failCount > 0 ? 'err' : (driftCount > 0 ? 'warn' : 'ok');
  icon.className = 'vt-icon ' + overallStatus;
  summary.textContent = '共' + totalCount + '项 · 通过' + passCount + ' · 偏差' + driftCount + ' · 异常' + failCount + ' · 阈值: <1%通过/<3%偏差';
}

// Trigger verification after main data loads
setTimeout(fetchVerifyPrices, 3000);
</script>
