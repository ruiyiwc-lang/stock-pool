<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI泡沫温度计</title>
<style>
:root{--bg:#0a0f1a;--card:#111827;--border:#1e3a5f;--text:#e0e6ed;--dim:#6b7b8d;--safe:#1a7a4c;--warn:#c9a84c;--danger:#c0392b;--accent:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','SF Pro Display','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:16px;padding-left:80px;max-width:900px;margin:0 auto;font-size:16px}

/* Header */
.header{display:flex;align-items:center;gap:24px;padding:24px;background:var(--card);border-radius:16px;border:1px solid var(--border);margin-bottom:12px}
.gauge-wrap{position:relative;width:140px;height:140px;flex-shrink:0}
.gauge-wrap svg{width:140px;height:140px}
.gauge-bg{fill:none;stroke:var(--border);stroke-width:12}
.gauge-fill{fill:none;stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset .8s ease,stroke .5s}
.gauge-txt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.gauge-num{font-size:36px;font-weight:700;letter-spacing:-1px;color:var(--text)}
.gauge-lbl{font-size:13px;color:var(--dim)}
.hdr-info{flex:1}
.hdr-title{font-size:26px;font-weight:600;margin-bottom:4px;color:#c9a84c}
.hdr-status{font-size:16px;margin-bottom:8px}
.hdr-meta{display:flex;gap:16px;flex-wrap:wrap}
.meta{font-size:15px;color:var(--dim)}
.meta b{color:var(--text);font-weight:500}

/* Summary */
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;text-align:center}
.sum-lbl{font-size:14px;color:var(--dim);margin-bottom:4px}
.sum-val{font-size:20px;font-weight:600}

/* Section */
.sec{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border)}
.sec-title{font-size:16px;font-weight:600}
.sec-score{font-size:15px;font-weight:500}

/* Indicator */
.ind{display:grid;grid-template-columns:1fr 70px 130px 44px;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.06);font-size:15px}
.ind:last-child{border-bottom:none}
.ind-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ind-val{text-align:right;color:var(--dim);font-family:'SF Mono',Menlo,monospace;font-size:14px}
.ind-bar{display:flex;align-items:center;gap:6px;padding:0 6px}
.bar-track{flex:1;height:8px;background:#1e2d4a;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s,background .3s}
.bar-sc{font-size:13px;color:var(--dim);font-family:'SF Mono',Menlo,monospace;width:22px;text-align:right}
.ind-st{text-align:center;font-size:15px}

/* Trigger */
.trig{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.06);font-size:15px}
.trig:last-child{border-bottom:none}
.trig-r{font-weight:600}

/* Buy */
.buy-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px}
.buy-card{padding:10px 14px;border-radius:8px;background:var(--bg);border:1px solid var(--border)}
.buy-name{font-size:15px;font-weight:500;margin-bottom:2px}
.buy-pe{font-size:14px;color:var(--dim)}
.buy-sig{font-size:14px;font-weight:500;margin-top:4px}

/* Macro */
.macro-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;padding:12px}
.macro-item{padding:8px 12px;border-radius:8px;background:var(--bg)}
.macro-lbl{font-size:13px;color:var(--dim)}
.macro-val{font-size:18px;font-weight:600}

/* Config */
.cfg-toggle{background:none;border:none;color:var(--dim);font-size:14px;cursor:pointer;padding:6px 16px;width:100%;text-align:left;border-top:1px solid var(--border)}
.cfg-toggle:hover{color:var(--accent)}
.cfg{display:none;padding:12px 16px;background:var(--bg);border-top:1px solid var(--border)}
.cfg.open{display:block}
.cfg-row{display:grid;grid-template-columns:1fr 55px 65px 65px;gap:6px;align-items:center;padding:3px 0;font-size:14px}
.cfg-input{background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px 6px;font-size:14px;width:100%;text-align:center}
.cfg-input:focus{outline:none;border-color:var(--accent)}
.cfg-reset{background:none;border:1px solid var(--border);color:var(--dim);border-radius:4px;padding:4px 12px;font-size:13px;cursor:pointer;margin-top:8px}
.cfg-reset:hover{border-color:var(--danger);color:var(--danger)}
.bal-row{display:flex;gap:12px;align-items:center;padding:8px 16px;font-size:15px;flex-wrap:wrap}
.bal-input{background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px 6px;font-size:14px;width:50px;text-align:center}
.bal-input:focus{outline:none;border-color:var(--accent)}

/* Mobile */
@media(max-width:600px){
body{padding:8px}
.header{flex-direction:column;text-align:center;padding:16px}
.gauge-wrap,.gauge-wrap svg{width:120px;height:120px}
.gauge-num{font-size:28px}
.summary{grid-template-columns:1fr 1fr 1fr;gap:6px}
.sum-val{font-size:15px}
.ind{grid-template-columns:1fr 55px 90px 36px;font-size:14px}
.buy-grid{grid-template-columns:1fr}
.cfg-row{grid-template-columns:1fr 45px 55px 55px;font-size:13px}
}
.tsafe{color:var(--safe)}.twarn{color:var(--warn)}.tdanger{color:var(--danger)}

/* 数据校验面板 */
.verify-panel { background:#0d1420; border:1px solid #1e3a5f; border-radius:12px; padding:18px 22px; margin-top:24px; margin-bottom:32px; }
.verify-title { font-size:16px; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.verify-title .vt-icon { width:8px; height:8px; border-radius:50%; }
.verify-title .vt-icon.ok { background:#22c55e; box-shadow:0 0 6px rgba(34,197,94,.5); }
.verify-title .vt-icon.warn { background:#eab308; box-shadow:0 0 6px rgba(234,179,8,.5); }
.verify-title .vt-icon.err { background:#ef4444; box-shadow:0 0 6px rgba(239,68,68,.5); }
.verify-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:10px; }
.verify-item { background:rgba(255,255,255,.02); border:1px solid #1a2940; border-radius:8px; padding:10px 14px; font-size:14px; }
.verify-item.pass { border-left:3px solid #22c55e; }
.verify-item.drift { border-left:3px solid #eab308; }
.verify-item.fail { border-left:3px solid #ef4444; }
.vi-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.vi-name { font-weight:700; color:#e0e6ed; }
.vi-badge { font-size:14px; padding:2px 6px; border-radius:4px; font-weight:600; }
.vi-badge.pass { background:rgba(34,197,94,.12); color:#22c55e; }
.vi-badge.drift { background:rgba(234,179,8,.12); color:#eab308; }
.vi-badge.fail { background:rgba(239,68,68,.12); color:#ef4444; }
.vi-row { display:flex; justify-content:space-between; color:#8fa0b3; margin-bottom:2px; }
.vi-row .src { color:#6b7b8d; }
.vi-row .val { color:#e0e6ed; font-weight:600; }
</style>
</head>

<script>
/* LAYERS 和 calcSc 使用 bubble-data.js 导出的共享变量 */
const LAYERS = BUBBLE_LAYERS;
const layerMap = BUBBLE_LAYER_MAP;

const BUYS=[
{k:'tencent_pe',n:'腾讯',target:10,dir:'buy'},
{k:'baba_pe',n:'BABA',target:20,dir:'sell'},
{k:'tsm_pe',n:'TSM台积电',target:13,dir:'buy'},
{k:'asml_pe',n:'ASML光刻机',target:18,dir:'buy'}
];

let BAL={bg:45,ng:70};
const COL={safe:'#22c55e',warn:'#eab308',danger:'#ef4444'};

/* ===== SCORE ENGINE (uses shared bubbleCalcSc) ===== */
function calcSc(v,s,d,dir){ return bubbleCalcSc(v,s,d,dir); }
function getSt(sc){if(sc<=40)return{t:'安全',c:'safe',e:'🟢'};if(sc<=70)return{t:'警戒',c:'warn',e:'🟡'};return{t:'危险',c:'danger',e:'🔴'};}

/* ===== CONFIG PERSISTENCE ===== */
function loadCfg(){try{
const s=localStorage.getItem('bubble_cfg_v3');if(!s)return;
const p=JSON.parse(s);
for(const lk in LAYERS){if(!p[lk])continue;
for(const it of LAYERS[lk].items){const sv=p[lk][it.k];if(sv){it.w=sv.w??it.w;it.s=sv.s??it.s;it.d=sv.d??it.d;}}
if(p[lk]._wt!=null)LAYERS[lk].wt=p[lk]._wt;}
if(p.bal){BAL.bg=p.bal.bg??BAL.bg;BAL.ng=p.bal.ng??BAL.ng;}
}catch(e){}}

function saveCfg(){try{
const o={bal:{bg:BAL.bg,ng:BAL.ng}};
for(const lk in LAYERS){o[lk]={_wt:LAYERS[lk].wt};for(const it of LAYERS[lk].items)o[lk][it.k]={w:it.w,s:it.s,d:it.d};}
localStorage.setItem('bubble_cfg_v3',JSON.stringify(o));
}catch(e){}}

function updCfg(lk,key,field,val){
const it=LAYERS[lk].items.find(i=>i.k===key);if(!it)return;
const n=parseFloat(val);if(isNaN(n))return;
if(field==='w')it.w=n;else if(field==='s')it.s=n;else if(field==='d')it.d=n;
saveCfg();renderAll();
}
function togCfg(lk){document.getElementById('cfg'+lk).classList.toggle('open')}
function resetCfg(){if(confirm('恢复所有权重和阈值到默认值？')){localStorage.removeItem('bubble_cfg_v3');location.reload();}}
function updBal(){
BAL.bg=parseFloat(document.getElementById('balBG').value)||45;
BAL.ng=parseFloat(document.getElementById('balNG').value)||70;
saveCfg();renderAll();
}

/* ===== MAIN RENDER ===== */
function renderAll(){
const D=window.BUBBLE_DATA;if(!D){document.getElementById('hStatus').textContent='❌ 未加载 bubble-data.js';return;}

// Init balance from data
if(D.manual){
  if(!localStorage.getItem('bubble_cfg_v3')){
    BAL.bg=D.manual.baba_growth??BAL.bg;
    BAL.ng=D.manual.nvda_growth??BAL.ng;
  }
}
document.getElementById('balBG').value=BAL.bg;
document.getElementById('balNG').value=BAL.ng;

// Date & Gate1
document.getElementById('hDate').textContent=D.updateDate||'--';
const g1=D.manual?.gate1;
const ge=document.getElementById('hGate');
ge.textContent=g1?'✓通过':'✗不通过';ge.style.color=g1?COL.safe:COL.danger;

// Calculate all layers
const R={};
for(const lk in LAYERS){
const L=LAYERS[lk];const ld=D[layerMap[lk]]||{};
let ts=0,tw=0;const scores=[];
for(const it of L.items){
const v=ld[it.k]?.value??null;
const sc=v!=null?Math.round(calcSc(v,it.s,it.d,it.dir)):0;
scores.push({...it,val:v,sc,date:ld[it.k]?.date||''});
ts+=sc*it.w;tw+=it.w;
}
const ls=tw>0?Math.round(ts/tw):0;
R[lk]={sc:ls,wt:L.wt,scores,nWarn:scores.filter(s=>s.sc>40).length,nDanger:scores.filter(s=>s.sc>70).length};

// Render indicator rows
let h='';
for(const s of scores){const st_=getSt(s.sc);
const dv=s.val!=null?(typeof s.val==='number'?(Math.abs(s.val)>=100?Math.round(s.val):s.val):s.val):'--';

// Fetch real-time prices from Tencent API, override hardcoded values, then render
(function() {
  // Mapping: qtCode -> { target layer, key, field to update, how to compute }
  var LIVE_CODES = {
    // Layer1: %距高点 = (high - price) / high * 100
    'usNVDA':   { layer: 'layer1', key: 'nvda_pe', field: 'pe_from_api' },  // NVDA use PE from field[39]
    'usTSM':    { layer: 'layer1', key: 'tsm', high: null },   // high from existing data
    'usAVGO':   { layer: 'layer1', key: 'avgo', high: null },
    'usMU':     { layer: 'layer1', key: 'mu', high: null },
    'sh300308': { layer: 'layer1', key: 'xuchuang', high: null },
    'sh002463': { layer: 'layer1', key: 'hudian', high: null },
    'sh601138': { layer: 'layer1', key: 'fulian', high: null },
    'sh512480': { layer: 'layer1', key: 'etf_512480', high: null },
    // Layer2: PE from field[39]
    'hk00700':  { layer: 'layer2', key: 'tencent_pe', usePE: true },
    'hk09988':  { layer: 'layer2', key: 'baba_pe', usePE: true },
    'usTSM_l2': { layer: 'layer2', key: 'tsm_pe', usePE: true, qtCode: 'usTSM' },
    // A-shares: price + change
    'sh688981': { layer: 'a_shares', key: 'smic' },
    'sh688498': { layer: 'a_shares', key: 'sourcejet' }
  };

  // Build codes list (deduplicate usTSM)
  var codeList = ['usNVDA','usTSM','usAVGO','usMU','sh300308','sh002463','sh601138','sh512480','hk00700','hk09988','sh688981','sh688498'];
  var url = 'https://qt.gtimg.cn/q=' + codeList.join(',');

  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status === 200) {
      var lines = xhr.responseText.split(';');
      var parsed = {};
      for (var i = 0; i < lines.length; i++) {
        var m = lines[i].match(/v_([^=]+)="([^"]*)"/);
        if (!m) continue;
        var fields = m[2].split('~');
        parsed[m[1]] = {
          price: parseFloat(fields[3]) || 0,
          prevClose: parseFloat(fields[4]) || 0,
          pe: parseFloat(fields[39]) || 0
        };
      }

      var D = window.BUBBLE_DATA;

      // Update Layer1: %距高点
      var l1Map = {
        'usTSM': 'tsm', 'usAVGO': 'avgo', 'usMU': 'mu',
        'sh300308': 'xuchuang', 'sh002463': 'hudian', 'sh601138': 'fulian', 'sh512480': 'etf_512480'
      };
      for (var code in l1Map) {
        var key = l1Map[code];
        var p = parsed[code];
        if (p && p.price > 0 && D.layer1[key]) {
          var high = D.layer1[key].high || 0;
          if (high > 0) {
            var distPct = ((high - p.price) / high * 100);
            D.layer1[key].value = parseFloat(distPct.toFixed(1));
            D.layer1[key].price = p.price;
            D.layer1[key].date = new Date().toISOString().slice(0, 10);
            D.layer1[key].source = '腾讯API实时';
          }
        }
      }

      // Update NVDA PE from field[39]
      if (parsed['usNVDA'] && parsed['usNVDA'].pe > 0 && D.layer1['nvda_pe']) {
        D.layer1['nvda_pe'].value = parsed['usNVDA'].pe;
        D.layer1['nvda_pe'].date = new Date().toISOString().slice(0, 10);
        D.layer1['nvda_pe'].source = '腾讯API实时';
      }

      // Update Layer2: PE values
      var l2Map = { 'hk00700': 'tencent_pe', 'hk09988': 'baba_pe', 'usTSM': 'tsm_pe' };
      for (var code2 in l2Map) {
        var key2 = l2Map[code2];
        var p2 = parsed[code2];
        if (p2 && p2.pe > 0 && D.layer2[key2]) {
          D.layer2[key2].value = parseFloat(p2.pe.toFixed(1));
          D.layer2[key2].date = new Date().toISOString().slice(0, 10);
          D.layer2[key2].source = '腾讯API实时';
        }
      }
      // Update manual.baba_pe for balance calculation
      if (parsed['hk09988'] && parsed['hk09988'].pe > 0) {
        D.manual.baba_pe = parseFloat(parsed['hk09988'].pe.toFixed(1));
      }

      // Update A-shares
      var ashMap = { 'sh688981': 'smic', 'sh688498': 'sourcejet' };
      for (var code3 in ashMap) {
        var key3 = ashMap[code3];
        var p3 = parsed[code3];
        if (p3 && p3.price > 0 && D.a_shares[key3]) {
          var chg3 = p3.prevClose > 0 ? ((p3.price - p3.prevClose) / p3.prevClose * 100) : 0;
          D.a_shares[key3].price = p3.price;
          D.a_shares[key3].change = parseFloat(chg3.toFixed(2));
          D.a_shares[key3].date = new Date().toISOString().slice(0, 10);
          D.a_shares[key3].source = '腾讯API实时';
        }
      }

      // Update the date display
      D.updateDate = new Date().toISOString().slice(0, 10) + ' (实时)';
    }
    // Render regardless (fallback to hardcoded if API fails)
    renderAll();
  };
  xhr.onerror = function() { renderAll(); };
  xhr.send();

  // Auto-refresh every 60s
  setInterval(function() {
    var xhr2 = new XMLHttpRequest();
    xhr2.open('GET', url, true);
    xhr2.onreadystatechange = function() {
      if (xhr2.readyState === 4 && xhr2.status === 200) {
        // Re-parse and update (same logic)
        var lines = xhr2.responseText.split(';');
        var parsed = {};
        for (var i = 0; i < lines.length; i++) {
          var m = lines[i].match(/v_([^=]+)="([^"]*)"/);
          if (!m) continue;
          var fields = m[2].split('~');
          parsed[m[1]] = { price: parseFloat(fields[3]) || 0, prevClose: parseFloat(fields[4]) || 0, pe: parseFloat(fields[39]) || 0 };
        }
        var D = window.BUBBLE_DATA;
        var l1Map = {'usTSM':'tsm','usAVGO':'avgo','usMU':'mu','sh300308':'xuchuang','sh002463':'hudian','sh601138':'fulian','sh512480':'etf_512480'};
        for (var c in l1Map) { var k=l1Map[c],p=parsed[c]; if(p&&p.price>0&&D.layer1[k]){var h=D.layer1[k].high||0;if(h>0){D.layer1[k].value=parseFloat(((h-p.price)/h*100).toFixed(1));D.layer1[k].price=p.price;D.layer1[k].date=new Date().toISOString().slice(0,10);}} }
        if(parsed['usNVDA']&&parsed['usNVDA'].pe>0&&D.layer1['nvda_pe']){D.layer1['nvda_pe'].value=parsed['usNVDA'].pe;D.layer1['nvda_pe'].date=new Date().toISOString().slice(0,10);}
        var l2M={'hk00700':'tencent_pe','hk09988':'baba_pe','usTSM':'tsm_pe'};
        for(var c2 in l2M){var k2=l2M[c2],p2=parsed[c2];if(p2&&p2.pe>0&&D.layer2[k2]){D.layer2[k2].value=parseFloat(p2.pe.toFixed(1));}}
        if(parsed['hk09988']&&parsed['hk09988'].pe>0){D.manual.baba_pe=parseFloat(parsed['hk09988'].pe.toFixed(1));}
        var ashM={'sh688981':'smic','sh688498':'sourcejet'};
        for(var c3 in ashM){var k3=ashM[c3],p3=parsed[c3];if(p3&&p3.price>0&&D.a_shares[k3]){var chg=p3.prevClose>0?((p3.price-p3.prevClose)/p3.prevClose*100):0;D.a_shares[k3].price=p3.price;D.a_shares[k3].change=parseFloat(chg.toFixed(2));}}
        D.updateDate=new Date().toISOString().slice(0,10)+' (实时)';
        renderAll();
      }
    };
    xhr2.send();
  }, 60000);
})();
</script>
<div class="verify-panel" id="verifyPanel">
  <div class="verify-title"><span class="vt-icon ok" id="verifyIcon"></span> 数据双源校验</div>
  <div class="verify-grid" id="verifyGrid">
    <div class="verify-item" style="color:#6b7b8d;">校验中...</div>
  </div>
  <div style="font-size:13px;color:#6b7b8d;margin-top:8px;" id="verifySummary"></div>
</div>


<script>

// ===== 数据双源校验 =====
var VERIFY_RESULTS = {};

function codeToSecid(code) {
  if (code.indexOf('hk') === 0) return '116.' + code.replace('hk','');
  if (code.indexOf('sh') === 0) return '1.' + code.replace('sh','');
  if (code.indexOf('sz') === 0) return '0.' + code.replace('sz','');
  return null;
}

function fetchVerifyPrices() {
  var items = [
    {code:'usNVDA', name:'NVDA'},
    {code:'usTSM', name:'TSM'},
    {code:'usAVGO', name:'AVGO'},
    {code:'usMU', name:'MU'},
    {code:'sh300308', name:'旭创'},
    {code:'sh002463', name:'沪电'},
    {code:'sh601138', name:'富联'},
    {code:'sh512480', name:'半导体ETF'},
    {code:'hk00700', name:'腾讯'},
    {code:'hk09988', name:'阿里'},
    {code:'sh688981', name:'中芯A'},
    {code:'sh688498', name:'源杰'}
  ];
  items.forEach(function(item) {
    var secid = codeToSecid(item.code);
    if (!secid) return;
    var qtRaw = window['v_' + item.code];
    var qtPrice = null;
    if (qtRaw) {
      var parts = (typeof qtRaw === 'string') ? qtRaw.split('~') : [];
      qtPrice = parseFloat(parts[3]) || null;
    }
    var controller = new AbortController();
    var timeoutId = setTimeout(function(){ controller.abort(); }, 5000);
    var url = 'https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=' + secid + '&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57&klt=101&fqt=1&end=20500101&lmt=1';
    fetch(url, {signal: controller.signal}).then(function(r){
      clearTimeout(timeoutId);
      return r.json();
    }).then(function(j){
      if (!j || !j.data || !j.data.klines || j.data.klines.length === 0) throw new Error('no data');
      var kline = j.data.klines[0].split(',');
      var emClose = parseFloat(kline[2]);
      recordVerify(item, qtPrice, emClose, 'eastmoney日K', kline[0]);
    }).catch(function(){
      clearTimeout(timeoutId);
      fetchIfzqFallback(item, qtPrice);
    });
  });
}

function fetchIfzqFallback(item, qtPrice) {
  var code = item.code;
  var ifzqCode, market;
  if (code.indexOf('hk') === 0) { ifzqCode = code; market = code; }
  else if (code.indexOf('sh') === 0 || code.indexOf('sz') === 0) { ifzqCode = code; market = code; }
  else { recordVerify(item, qtPrice, null, 'ifzq', null); return; }
  var url = 'https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=' + ifzqCode + ',day,,,1,qfq';
  if (code.indexOf('hk') === 0) {
    url = 'https://web.ifzq.gtimg.cn/appstock/app/hkfqkline/get?param=' + ifzqCode + ',day,,,1,qfq';
  }
  fetch(url).then(function(r){return r.json();}).then(function(j){
    if (!j || j.code !== 0 || !j.data) throw new Error('no data');
    var stockData = j.data[market] || j.data[Object.keys(j.data)[0]];
    if (!stockData) throw new Error('no stock data');
    var dayArr = stockData.qfqday || stockData.day;
    if (!dayArr || dayArr.length === 0) throw new Error('no kline');
    var lastDay = dayArr[dayArr.length - 1];
    var ifzqClose = parseFloat(lastDay[2]);
    recordVerify(item, qtPrice, ifzqClose, 'ifzq日K', lastDay[0]);
  }).catch(function(){
    recordVerify(item, qtPrice, null, 'ifzq', null);
  });
}

function recordVerify(item, qtPrice, src2Price, src2Source, src2Date) {
  if (qtPrice && src2Price) {
    var diff = Math.abs(qtPrice - src2Price) / qtPrice * 100;
    var status = diff < 1 ? 'pass' : (diff < 3 ? 'drift' : 'fail');
    VERIFY_RESULTS[item.code] = {name:item.name, src1:qtPrice, src2:src2Price, diff:diff, status:status, src2Source:src2Source, klineDate:src2Date};
  } else if (qtPrice) {
    VERIFY_RESULTS[item.code] = {name:item.name, src1:qtPrice, src2:null, diff:null, status:'fail', src2Source:src2Source||'备选源'};
  } else {
    VERIFY_RESULTS[item.code] = {name:item.name, src1:null, src2:src2Price||null, diff:null, status:'fail', src2Source:src2Source||'备选源'};
  }
  renderVerifyPanel();
}

function renderVerifyPanel() {
  var grid = document.getElementById('verifyGrid');
  var icon = document.getElementById('verifyIcon');
  var summary = document.getElementById('verifySummary');
  if (!grid) return;
  var html = '';
  var passCount = 0, driftCount = 0, failCount = 0, totalCount = 0;
  var codes = Object.keys(VERIFY_RESULTS).sort();
  codes.forEach(function(code) {
    var r = VERIFY_RESULTS[code];
    totalCount++;
    if (r.status === 'pass') passCount++;
    else if (r.status === 'drift') driftCount++;
    else failCount++;
    html += '<div class="verify-item ' + r.status + '">';
    html += '<div class="vi-head"><span class="vi-name">' + r.name + '</span><span class="vi-badge ' + r.status + '">' + (r.status==='pass'?'一致':r.status==='drift'?'偏差':'异常') + '</span></div>';
    html += '<div class="vi-row"><span class="src">qt.gtimg</span><span class="val">' + (r.src1 !== null ? r.src1.toFixed(2) : '失败') + '</span></div>';
    html += '<div class="vi-row"><span class="src">' + (r.src2Source||'eastmoney') + (r.klineDate?' ('+r.klineDate+')':'') + '</span><span class="val">' + (r.src2 !== null ? r.src2.toFixed(2) : '失败') + '</span></div>';
    if (r.diff !== null) html += '<div class="vi-row"><span class="src">偏差</span><span class="val">' + r.diff.toFixed(2) + '%</span></div>';
    html += '</div>';
  });
  grid.innerHTML = html;
  var overallStatus = failCount > 0 ? 'err' : (driftCount > 0 ? 'warn' : 'ok');
  icon.className = 'vt-icon ' + overallStatus;
  summary.textContent = '共' + totalCount + '项 · 通过' + passCount + ' · 偏差' + driftCount + ' · 异常' + failCount + ' · 阈值: <1%通过/<3%偏差';
}

// Trigger verification after main data loads
setTimeout(fetchVerifyPrices, 3000);
</script>
